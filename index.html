<html lang="en">
<head>
<meta charset="UTF-8">
<title>Base64 Zstd Lua Table Editor</title>
<style>
    body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
    textarea { width: 100%; height: 150px; margin-bottom: 10px; font-family: monospace; }
    button { margin-right: 10px; padding: 10px 20px; font-size: 16px; }
    pre { background: #f0f0f0; padding: 10px; white-space: pre-wrap; word-wrap: break-word; }
</style>
</head>
<body>

<h2>Base64 Zstd Lua Table Editor</h2>

<label for="inputArea">Input Base64 String:</label>
<textarea id="inputArea" placeholder="Paste Base64 here..."></textarea>

<div>
    <button id="decodeBtn">Decode</button>
    <button id="encodeBtn">Encode</button>
</div>

<label for="outputArea">Output:</label>
<pre id="outputArea"></pre>

<!-- Browser-ready Zstd library -->
<script src="https://cdn.jsdelivr.net/npm/@hiogawa/zstd-codec-wasm@1.5.2/dist/zstd.min.js"></script>

<script>
let currentTable = null;

// Wait for Zstd WASM to load
Zstd.ready.then(() => {
    const simple = new Zstd.Simple();

    const inputArea = document.getElementById('inputArea');
    const outputArea = document.getElementById('outputArea');
    const decodeBtn = document.getElementById('decodeBtn');
    const encodeBtn = document.getElementById('encodeBtn');

    // Decode Base64 → Zstd → Lua JSON
    decodeBtn.addEventListener('click', () => {
        const input = inputArea.value.trim();
        try {
            const binary = atob(input);
            const compressed = Uint8Array.from(binary, c => c.charCodeAt(0));
            const decompressed = simple.decompress(compressed);
            const text = new TextDecoder().decode(decompressed);
            const result = JSON.parse(text);

            result.forEach(item => item.DATA = JSON.parse(item.DATA));

            currentTable = result;
            outputArea.textContent = JSON.stringify(result, null, 2);
        } catch (err) {
            outputArea.textContent = 'Error decoding: ' + err;
            currentTable = null;
        }
    });

    // Encode Lua JSON → Zstd → Base64
    encodeBtn.addEventListener('click', () => {
        if (!currentTable) {
            outputArea.textContent = 'No table to encode. Decode first!';
            return;
        }
        try {
            const copy = JSON.parse(JSON.stringify(currentTable));
            copy.forEach(item => item.DATA = JSON.stringify(item.DATA));

            const json = JSON.stringify(copy);
            const bytes = new TextEncoder().encode(json);
            const compressed = simple.compress(bytes);

            let binary = '';
            compressed.forEach(b => binary += String.fromCharCode(b));
            const base64 = btoa(binary);

            outputArea.textContent = base64;
        } catch (err) {
            outputArea.textContent = 'Error encoding: ' + err;
        }
    });

}).catch(err => {
    console.error('Failed to load Zstd WASM:', err);
});
</script>

</body>
</html>
