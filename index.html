<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zstd Lua Table Editor</title>
<style>
body {
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: 30px auto;
    padding: 20px;
}

textarea {
    width: 100%;
    font-family: monospace;
    margin-bottom: 15px;
}

#input { height: 120px; }
#editor { height: 300px; }

button {
    padding: 8px 14px;
    margin-right: 10px;
    cursor: pointer;
}

pre {
    background: #f3f3f3;
    padding: 15px;
    white-space: pre-wrap;
    word-wrap: break-word;
}
</style>
</head>
<body>

<h2>Zstd Lua Table Editor</h2>

<label>Compressed Base64 Input:</label>
<textarea id="input"></textarea>

<div>
    <button id="decode">Decode → Edit</button>
    <button id="encode">Encode Edited Table</button>
</div>

<label>Editable Lua Table:</label>
<textarea id="editor"></textarea>

<h3>Encoded Output:</h3>
<pre id="output"></pre>

<script src="zstd/zstd.js"></script>

<script>
let zstdModule;

// -------------------------
// Zstd Helpers
// -------------------------
async function init() {
    zstdModule = await Zstd({
        locateFile: file => 'zstd/' + file
    });
    document.getElementById('output').textContent = 'Zstd loaded successfully.';
}

function base64ToBytes(base64) {
    const binary = atob(base64);
    return Uint8Array.from(binary, c => c.charCodeAt(0));
}

function bytesToBase64(bytes) {
    let binary = '';
    bytes.forEach(b => binary += String.fromCharCode(b));
    return btoa(binary);
}

function decompressBase64(base64) {
    const compressed = base64ToBytes(base64);
    const inPtr = zstdModule._malloc(compressed.length);
    zstdModule.HEAPU8.set(compressed, inPtr);

    const outSize = compressed.length * 20;
    const outPtr = zstdModule._malloc(outSize);

    const resultSize = zstdModule._ZSTD_decompress(outPtr, outSize, inPtr, compressed.length);
    if (resultSize <= 0) throw new Error("Decompression failed");

    const result = zstdModule.HEAPU8.slice(outPtr, outPtr + resultSize);
    const text = new TextDecoder().decode(result);

    zstdModule._free(inPtr);
    zstdModule._free(outPtr);
    return text;
}

function compressToBase64(text) {
    const bytes = new TextEncoder().encode(text);
    const inPtr = zstdModule._malloc(bytes.length);
    zstdModule.HEAPU8.set(bytes, inPtr);

    const outSize = bytes.length * 2;
    const outPtr = zstdModule._malloc(outSize);

    const resultSize = zstdModule._ZSTD_compress(outPtr, outSize, inPtr, bytes.length, 3);
    if (resultSize <= 0) throw new Error("Compression failed");

    const compressed = zstdModule.HEAPU8.slice(outPtr, outPtr + resultSize);
    const base64 = bytesToBase64(compressed);

    zstdModule._free(inPtr);
    zstdModule._free(outPtr);
    return base64;
}

// -------------------------
// Minimal Lua Table Parser
// -------------------------
// Supports simple {key=value, key2={...}} tables
// Strings with "" or '' are supported
function parseLuaTable(str) {
    // Replace Lua-style syntax for easier eval: {key=value} -> {key:"value"}
    let s = str.replace(/(\w+)\s*=/g, '"$1":');
    s = s.replace(/'/g, '"');  // single quotes -> double quotes
    return JSON.parse(s);
}

function stringifyLuaTable(obj, indent=0) {
    const pad = '  '.repeat(indent);
    if (typeof obj === 'object' && !Array.isArray(obj)) {
        let entries = Object.entries(obj).map(([k,v]) => `${k}=${stringifyLuaTable(v, indent+1)}`);
        return '{\n' + pad + entries.join(',\n' + pad) + '\n' + '  '.repeat(indent-1) + '}';
    } else if (Array.isArray(obj)) {
        let arr = obj.map(v => stringifyLuaTable(v, indent+1));
        return '{' + arr.join(',') + '}';
    } else if (typeof obj === 'string') {
        return `"${obj}"`;
    } else {
        return String(obj);
    }
}

// -------------------------
// Event Handlers
// -------------------------
document.getElementById('decode').addEventListener('click', () => {
    try {
        const base64 = document.getElementById('input').value.trim();
        const luaText = decompressBase64(base64);
        document.getElementById('editor').value = luaText;
        document.getElementById('output').textContent = 'Decoded successfully.';
    } catch (err) {
        document.getElementById('output').textContent = 'Decode error: ' + err;
    }
});

document.getElementById('encode').addEventListener('click', () => {
    try {
        const editedText = document.getElementById('editor').value;
        const base64 = compressToBase64(editedText);
        document.getElementById('output').textContent = base64;
    } catch (err) {
        document.getElementById('output').textContent = 'Encode error: ' + err;
    }
});

init();
</script>

</body>
</html>
