<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zstd Base64 Tool</title>
<style>
body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
}

textarea {
    width: 100%;
    height: 220px;
    font-family: monospace;
    margin-bottom: 15px;
}

button {
    padding: 10px 18px;
    margin-right: 10px;
    cursor: pointer;
}

pre {
    background: #f3f3f3;
    padding: 15px;
    white-space: pre-wrap;
    word-wrap: break-word;
}
</style>
</head>
<body>

<h2>Zstd Base64 Decoder / Encoder</h2>

<label>Input:</label>
<textarea id="input"></textarea>

<div>
    <button id="decode">Decode</button>
    <button id="encode">Encode</button>
</div>

<h3>Output:</h3>
<pre id="output"></pre>

<script src="zstd/zstd.js"></script>

<script>
let zstdModule;

async function init() {
    zstdModule = await Zstd({
        locateFile: file => 'zstd/' + file
    });

    document.getElementById('output').textContent = 'Zstd loaded successfully.';
}

function base64ToBytes(base64) {
    const binary = atob(base64);
    return Uint8Array.from(binary, c => c.charCodeAt(0));
}

function bytesToBase64(bytes) {
    let binary = '';
    bytes.forEach(b => binary += String.fromCharCode(b));
    return btoa(binary);
}

document.getElementById('decode').addEventListener('click', () => {
    try {
        const input = document.getElementById('input').value.trim();
        const compressed = base64ToBytes(input);

        const inPtr = zstdModule._malloc(compressed.length);
        zstdModule.HEAPU8.set(compressed, inPtr);

        const outSize = compressed.length * 20;
        const outPtr = zstdModule._malloc(outSize);

        const resultSize = zstdModule._ZSTD_decompress(
            outPtr,
            outSize,
            inPtr,
            compressed.length
        );

        if (resultSize <= 0) throw new Error("Decompression failed");

        const result = zstdModule.HEAPU8.slice(outPtr, outPtr + resultSize);
        const text = new TextDecoder().decode(result);

        document.getElementById('output').textContent = text;

        zstdModule._free(inPtr);
        zstdModule._free(outPtr);

    } catch (err) {
        document.getElementById('output').textContent = 'Decode error: ' + err;
    }
});

document.getElementById('encode').addEventListener('click', () => {
    try {
        const input = document.getElementById('input').value;
        const bytes = new TextEncoder().encode(input);

        const inPtr = zstdModule._malloc(bytes.length);
        zstdModule.HEAPU8.set(bytes, inPtr);

        const outSize = bytes.length * 2;
        const outPtr = zstdModule._malloc(outSize);

        const resultSize = zstdModule._ZSTD_compress(
            outPtr,
            outSize,
            inPtr,
            bytes.length,
            3
        );

        if (resultSize <= 0) throw new Error("Compression failed");

        const compressed = zstdModule.HEAPU8.slice(outPtr, outPtr + resultSize);
        const base64 = bytesToBase64(compressed);

        document.getElementById('output').textContent = base64;

        zstdModule._free(inPtr);
        zstdModule._free(outPtr);

    } catch (err) {
        document.getElementById('output').textContent = 'Encode error: ' + err;
    }
});

init();
</script>

</body>
</html>
