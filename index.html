<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zstd Base64 Lua Table Tool</title>
<style>
body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
}

textarea {
    width: 100%;
    height: 180px;
    font-family: monospace;
    margin-bottom: 15px;
}

button {
    padding: 10px 18px;
    margin-right: 10px;
    cursor: pointer;
}

pre {
    background: #f3f3f3;
    padding: 15px;
    white-space: pre-wrap;
    word-wrap: break-word;
}
</style>
</head>
<body>

<h2>Zstd Base64 Lua Table Decoder / Encoder</h2>

<label>Input Base64:</label>
<textarea id="input"></textarea>

<div>
    <button id="decode">Decode</button>
    <button id="encode">Encode</button>
</div>

<h3>Output:</h3>
<pre id="output"></pre>

<script src="zstd/zstd.js"></script>

<script>
let zstdModule;
let currentData = null;

async function initZstd() {
    zstdModule = await Zstd({
        locateFile: file => 'zstd/' + file
    });
    document.getElementById('output').textContent = 'Zstd loaded successfully.';
}

function base64ToBytes(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
    }
    return bytes;
}

function bytesToBase64(bytes) {
    let binary = '';
    for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary);
}

document.getElementById('decode').addEventListener('click', () => {
    try {
        const input = document.getElementById('input').value.trim();
        const compressed = base64ToBytes(input);

        const decompressed = zstdModule._malloc(compressed.length);
        zstdModule.HEAPU8.set(compressed, decompressed);

        const outSize = 1000000;
        const outputPtr = zstdModule._malloc(outSize);

        const resultSize = zstdModule._ZSTD_decompress(
            outputPtr,
            outSize,
            decompressed,
            compressed.length
        );

        if (resultSize < 0) {
            throw new Error("ZSTD decompression failed");
        }

        const result = zstdModule.HEAPU8.slice(outputPtr, outputPtr + resultSize);

        const text = new TextDecoder().decode(result);

        currentData = text;

        document.getElementById('output').textContent = text;

        zstdModule._free(decompressed);
        zstdModule._free(outputPtr);

    } catch (err) {
        document.getElementById('output').textContent = 'Decode error: ' + err;
    }
});

document.getElementById('encode').addEventListener('click', () => {
    try {
        if (!currentData) {
            throw new Error("No decoded data available");
        }

        const inputBytes = new TextEncoder().encode(currentData);

        const inputPtr = zstdModule._malloc(inputBytes.length);
        zstdModule.HEAPU8.set(inputBytes, inputPtr);

        const outSize = inputBytes.length * 2;
        const outputPtr = zstdModule._malloc(outSize);

        const compressedSize = zstdModule._ZSTD_compress(
            outputPtr,
            outSize,
            inputPtr,
            inputBytes.length,
            3
        );

        if (compressedSize < 0) {
            throw new Error("ZSTD compression failed");
        }

        const compressed = zstdModule.HEAPU8.slice(outputPtr, outputPtr + compressedSize);

        const base64 = bytesToBase64(compressed);

        document.getElementById('output').textContent = base64;

        zstdModule._free(inputPtr);
        zstdModule._free(outputPtr);

    } catch (err) {
        document.getElementById('output').textContent = 'Encode error: ' + err;
    }
});

initZstd();
</script>

</body>
</html>
